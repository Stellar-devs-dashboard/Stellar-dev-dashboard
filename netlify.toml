[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'sha256-Q+phTnCmXICynHkH6QGXv2bYyr/Lrrc2IttPhtIHXH4='; connect-src 'self' https://horizon.stellar.org https://horizon-testnet.stellar.org https://horizon-futurenet.stellar.org https://soroban-rpc.stellar.org https://soroban-testnet.stellar.org https://soroban-futurenet.stellar.org https://api.coingecko.com https://friendbot.stellar.org https://friendbot-futurenet.stellar.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; frame-src 'none'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self';"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
